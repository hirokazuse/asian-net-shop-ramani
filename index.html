<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asian Fruits Netshop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ヘッダー -->
  <header>
    <div class="container">
      <h1 class="logo">Asian Fruits Netshop</h1>
      <nav>
        <a href="#home">ホーム</a>
        <a href="#products">商品</a>
        <a href="#contact">お問い合わせ</a>
      </nav>
    </div>
  </header>

  <!-- メインビジュアル -->
  <section id="home" class="hero">
    <div class="hero-text">
      <h2>日本・中国・韓国・ヨーロッパの新鮮な果物をお届け</h2>
      <p>アジア各国から旬のフルーツをタイへ直送！</p>
    </div>
  </section>

  <!-- 商品一覧 -->
  <section id="products" class="products">
    <h2>商品一覧</h2>
    <div class="product-list">
      <div class="product">
        <img src="https://via.placeholder.com/250x180.png?text=Shine+Muscat" alt="シャインマスカット">
        <h3>シャインマスカット</h3>
        <p>日本産の高級ぶどう。甘みが強く皮ごと食べられます。</p>
        <span class="price">฿1,200 / 房</span>
      </div>
      <div class="product">
        <img src="https://via.placeholder.com/250x180.png?text=Apple" alt="リンゴ">
        <h3>青森りんご</h3>
        <p>香り高くジューシーな日本のりんご。</p>
        <span class="price">฿150 / 個</span>
      </div>
      <div class="product">
        <img src="https://via.placeholder.com/250x180.png?text=Strawberry" alt="イチゴ">
        <h3>博多あまおう</h3>
        <p>甘さと酸味のバランスが絶妙な人気のいちご。</p>
        <span class="price">฿800 / パック</span>
      </div>
    </div>
  </section>

  <!-- お問い合わせ -->
  <section id="contact" class="contact">
    <h2>お問い合わせ</h2>
    <p>商品のご注文・お問い合わせは下記よりお願いします。</p>
    <a class="btn" href="https://www.facebook.com/profile.php?id=61555200404712" target="_blank">
      Facebookページへ
    </a>
  </section>

  <!-- フッター -->
  <footer>
    <p>&copy; 2025 Asian Fruits Netshop</p>
  </footer>
</body>
</html>
